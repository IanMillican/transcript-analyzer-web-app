{% extends "base.html" %}
{% block head %}
    <title>{{ "Select Degree" if degree_list else "Edit Degree" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='edit_degree.css') }}">
{% endblock head %}

{% block body %}
    <form action="/edit-degree/" method="GET">
        <select name="file_path">
            <option value="">Select a Degree</option>
            {% for degree in degree_list %}
                <option value="{{ degree.filename }}">{{ degree.program }}</option>
            {% endfor %}
        </select>
        <button type="submit">Edit</button>
    </form>
{% endblock body %}
